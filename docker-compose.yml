services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: market-mvp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: market-mvp-kafka
    depends_on:
      - zookeeper
    hostname: kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:29092"

  redis:
    image: redis:7-alpine
    container_name: market-mvp-redis
    ports:
      - "6379:6379"

  client-service:
    build:
      context: .
      dockerfile: src/MarketMvp.ClientService/Dockerfile
    container_name: market-mvp-client-service
    ports:
      - "5101:8080"

  portfolio-service:
    build:
      context: .
      dockerfile: src/MarketMvp.PortfolioService/Dockerfile
    container_name: market-mvp-portfolio-service
    ports:
      - "5102:8080"

  instrument-service:
    build:
      context: .
      dockerfile: src/MarketMvp.InstrumentService/Dockerfile
    container_name: market-mvp-instrument-service
    ports:
      - "5103:8080"

  price-service:
    build:
      context: .
      dockerfile: src/MarketMvp.PriceProjectionService/Dockerfile
    container_name: market-mvp-price-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_CONNECTION_STRING: redis:6379
    ports:
      - "5104:8080"

  market-data-ingestor:
    build:
      context: .
      dockerfile: src/MarketMvp.MarketDataIngestor/Dockerfile
    container_name: market-mvp-market-data-ingestor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5105:8080"

  bff:
    build:
      context: .
      dockerfile: src/MarketMvp.Bff/Dockerfile
    container_name: market-mvp-bff
    depends_on:
      - client-service
      - portfolio-service
      - instrument-service
      - price-service
    environment:
      CLIENT_SERVICE_URL: http://client-service:8080
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8080
      INSTRUMENT_SERVICE_URL: http://instrument-service:8080
      PRICE_SERVICE_URL: http://price-service:8080
    ports:
      - "5032:8080"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: market-mvp-ui
    depends_on:
      - bff
    ports:
      - "5173:80"
